services:
  # A PostgreSQL database
  - type: database
    name: agrizone_db
    ipAllowList: [] # Only allow internal connections

  # The Django Backend
  - type: web
    name: agrizone_backend
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn agrizone.wsgi:application

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrizone_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: ALLOWED_HOSTS
        value: "*"

  # The React Frontend
  - type: static_site
    name: agrizone_frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
